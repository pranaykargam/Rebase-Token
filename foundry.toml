
[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# RPC aliases for fork testing (update with your real URLs)
rpc_endpoints = { 
    sepolia = "YOUR_SEPOLIA_RPC_URL_HERE", 
    arb-sepolia = "YOUR_ARB_SEPOLIA_RPC_URL_HERE" 
}

remappings = [
    '@openzeppelin/contracts@5.0.2/=lib/openzeppelin-contracts/contracts/',
    '@openzeppelin/contracts@4.8.3/=lib/openzeppelin-contracts-4.8.3/contracts/',
    '@ccip/contracts/=lib/chainlink-ccip/chains/evm/contracts/',
    '@chainlink/contracts/=node_modules/@chainlink/contracts/',
    '@chainlink-local/=lib/chainlink-local/'
]

